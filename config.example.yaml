memory:
  enabled: true
  user_id: default_user
  search_limit: 5
  # Tiered memory system configuration
  tiered:
    enabled: true               # Use TieredMemoryManager instead of flat MemoryService
    short_term_capacity: 100    # Max messages in short-term memory
    working_memory_capacity: 10 # Max task contexts in working memory
    working_memory_ttl_hours: 24 # Hours before working memory expires
    decay_half_life_days: 30    # Half-life for time decay calculation
    min_decay_factor: 0.1       # Minimum decay factor
  # Optional: Custom Mem0 configuration
  # config:
  #   vector_store:
  #     provider: qdrant
  #     config:
  #       path: ./.mem0/qdrant
  #   llm:
  #     provider: openai
  #     config:
  #       model: gpt-4.1-nano-2025-04-14
  #       temperature: 0
  #   embedder:
  #     provider: openai
  #     config:
  #       model: text-embedding-3-small

tools:
  enabled:
    - edit
    - read
    - write
    - grep
    - ls
    - tree
    - bash
    - web_crawl
    - web_search
  configs:
    web_crawl:
      api_key: $FIRECRAWL_API_KEY
    web_search:
      api_key: $TAVILY_API_KEY
  mcp_servers:
    docs-langchain:
      transport: 'streamable_http'
      url: 'https://docs.langchain.com/mcp'

# Sandbox configuration for secure command execution
sandbox:
  enabled: false  # Set to true to enable Docker sandbox
  provider: docker
  image: python:3.12-slim
  working_dir: /workspace
  resource_limits:
    cpu: "1.0"        # Number of CPUs
    memory: "512M"    # Memory limit
    disk: "1G"        # Disk space limit
    pids_limit: 100   # Max processes
  network: disabled   # disabled | bridge | host
  timeout: 60         # Default execution timeout (seconds)
  # environment:      # Optional environment variables
  #   PATH: /usr/local/bin:/usr/bin:/bin

# Workflow configuration for multi-agent DAG execution
workflow:
  enabled: false              # Set to true to enable workflow mode
  default_mode: "single"     # "single" | "workflow" — startup default agent mode
  max_fix_iterations: 3      # Maximum fix iterations in Plan-Code-Test-Fix loop
  timeout_seconds: 300       # Workflow execution timeout
